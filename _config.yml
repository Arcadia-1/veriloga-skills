title: veriloga-skills
description: Agent skills for Verilog-A behavioral modeling targeting Cadence Virtuoso / Spectre

theme: jekyll-theme-cayman

plugins:
  - jekyll-readme-index
  - jekyll-relative-links
  - jekyll-titles-from-headings
  - jekyll-seo-tag
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: true

readme_index:
  with_frontmatter: true

include:
  - CNAME

exclude:
  - tests/
  - "**/__pycache__/**"
  - "**/*.pyc"
  - .gitignore
  - .tmp_*
  - WORK/
  - agent_playground/
  - veriloga-workspace/
  - agent-skill-format.md
